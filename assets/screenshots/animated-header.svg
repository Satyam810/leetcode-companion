<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 70" width="600" height="70">
  <style>
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    @keyframes slide {
      0% { transform: translateX(-5px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: #1e293b;
    }
    .accent {
      fill: url(#gradient);
    }
    .badge-bg {
      fill: rgba(79, 70, 229, 0.1);
      stroke: #4f46e5;
      stroke-width: 1.5;
      animation: pulse 3s infinite ease-in-out;
    }
    .badge-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #4f46e5;
      letter-spacing: 1px;
      animation: pulse 3s infinite ease-in-out;
    }
    /* Dark mode media query for system dark mode theme support */
    @media (prefers-color-scheme: dark) {
      .title {
        fill: #f8fafc;
      }
      .badge-bg {
        fill: rgba(129, 140, 248, 0.15);
        stroke: #818cf8;
      }
      .badge-text {
        fill: #818cf8;
      }
    }
  </style>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  
  <g style="animation: slide 0.8s ease-out forwards;">
    <!-- Title Text -->
    <text x="10" y="48" class="title">LeetCode Companion <tspan class="accent">.</tspan></text>
    
    <!-- Chrome Extension Badge -->
    <rect x="400" y="22" width="168" height="28" rx="6" class="badge-bg" />
    <text x="412" y="41" class="badge-text">CHROME EXTENSION</text>
  </g>
</svg>
